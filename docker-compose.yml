services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: research_agent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    depends_on:
      - postgres
      - minio
    env_file: .env
    environment:
      - DATABASE_URL=postgres://agent:agent@postgres:5432/research_agent
      - S3_ENDPOINT=http://minio:9000
    ports:
      - "3000:3000"

  discord:
    build:
      context: .
      dockerfile: packages/discord/Dockerfile
    depends_on:
      - api
    env_file: .env
    environment:
      - API_URL=http://api:3000/api

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
  minio_data:
